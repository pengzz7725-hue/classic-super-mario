<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>经典超级马里奥 · Classic Super Mario</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #5c94fc;
    font-family: "Press Start 2P", "Courier New", monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #wrap {
    position: relative;
    image-rendering: pixelated;
  }
  canvas {
    background: #5c94fc;
    display: block;
    border: 4px solid #000;
    box-shadow: 0 0 0 4px #fff, 0 8px 32px rgba(0,0,0,.5);
    image-rendering: pixelated;
    max-width: 100vw;
    max-height: 92vh;
  }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    text-align: center;
    background: rgba(0,0,0,.55);
    text-shadow: 2px 2px 0 #000;
    gap: 18px;
    padding: 20px;
  }
  #overlay h1 { font-size: clamp(18px, 4vw, 34px); color: #ffd700; letter-spacing: 2px; }
  #overlay p  { font-size: clamp(10px, 2vw, 14px); line-height: 1.9; }
  #overlay .key { color: #7cf; }
  #overlay.hidden { display: none; }
  #hint {
    position: absolute;
    left: 0; right: 0; bottom: 6px;
    text-align: center;
    color: #fff;
    font-size: 10px;
    text-shadow: 1px 1px 0 #000;
    opacity: .8;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="800" height="480"></canvas>
  <div id="overlay">
    <h1>超级马里奥</h1>
    <p>
      <span class="key">← →</span> 移动 &nbsp;·&nbsp;
      <span class="key">空格 / ↑</span> 跳跃<br>
      踩扁敌人 · 收集金币 · 抵达旗杆<br><br>
      按 <span class="key">回车</span> 或 <span class="key">空格</span> 开始
    </p>
  </div>
  <div id="hint">方向键移动 · 空格跳跃 · 长按跳得更高</div>
</div>

<script>
(() => {
  "use strict";

  // ---------- 画布 ----------
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  const overlay = document.getElementById("overlay");
  ctx.imageSmoothingEnabled = false;

  // ---------- 常量 ----------
  const TILE = 32;                 // 一个格子的像素大小
  const GRAVITY = 0.6;
  const MAX_FALL = 14;
  const MOVE_ACCEL = 0.6;
  const MAX_RUN = 4.2;
  const FRICTION = 0.78;
  const JUMP_V = -12.5;            // 起跳速度
  const JUMP_HOLD = -0.45;         // 长按延长跳跃

  // ---------- 关卡地图 ----------
  // 符号: X=地面/砖块  B=可顶砖块  ?=问号块(金币)  C=金币  G=Goomba敌人
  //       P=管道  =(顶/身)  F=旗杆  .=空
  const MAP = [
    "................................................................................................",
    "................................................................................................",
    "................................................................................................",
    "................................................................................................",
    "...........................?....................................................................",
    "................................................................................F...............",
    "..............C.C.C.......................CCC...................................F...............",
    ".....................B?B?B...........................BBB?BBB....................F...............",
    "...........................................G..................................F...............",
    "..............................G.............................P.P................F...............",
    ".................G..................PP......G.......G........=.=.....G..G.......F...............",
    "XXXXXXXXXXXXXX...XXXXXXXXXXXXXXXX==XXXXXXXXXXXXXXXXXX==X=XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
    "XXXXXXXXXXXXXX...XXXXXXXXXXXXXXXX==XXXXXXXXXXXXXXXXXX==X=XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
  ];
  const ROWS = MAP.length;
  const COLS = MAP[0].length;
  const LEVEL_W = COLS * TILE;
  const LEVEL_H = ROWS * TILE;

  // 把字符地图转成可变状态
  let solids, bumpables, coins, enemies, flagX;
  function tileAt(c, r) {
    if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return ".";
    return MAP[r][c];
  }

  // ---------- 实体 ----------
  let player, camX, keys, score, coinCount, lives, timeLeft, state, ticks;
  let particles, floatTexts;

  function resetLevel(full) {
    solids = [];      // {x,y,w,h}
    bumpables = [];   // {c,r,type,used,bumpT}
    coins = [];       // {x,y,t,taken}
    enemies = [];     // {x,y,vx,vy,dead,deadT}
    flagX = LEVEL_W - 6 * TILE;
    particles = [];
    floatTexts = [];

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const ch = MAP[r][c];
        const x = c * TILE, y = r * TILE;
        if (ch === "X" || ch === "P" || ch === "=") {
          solids.push({ x, y, w: TILE, h: TILE, kind: ch });
        } else if (ch === "B" || ch === "?") {
          bumpables.push({ c, r, x, y, type: ch, used: false, bumpT: 0 });
          solids.push({ x, y, w: TILE, h: TILE, kind: ch, bump: bumpables[bumpables.length - 1] });
        } else if (ch === "C") {
          coins.push({ x: x + 6, y: y + 4, t: 0, taken: false });
        } else if (ch === "G") {
          enemies.push({ x, y, w: 26, h: 26, vx: -1, vy: 0, dead: false, deadT: 0 });
        } else if (ch === "F") {
          flagX = x;
        }
      }
    }

    player = {
      x: 2 * TILE, y: 8 * TILE, w: 22, h: 30,
      vx: 0, vy: 0, onGround: false, face: 1,
      jumping: false, invuln: 0, walkT: 0, won: false, winT: 0,
    };
    camX = 0;
    ticks = 0;
    if (full) {
      score = 0; coinCount = 0; lives = 3;
    }
    timeLeft = 999;
  }

  function startGame() {
    resetLevel(true);
    state = "play";
    overlay.classList.add("hidden");
  }

  // ---------- 输入 ----------
  keys = {};
  const KEYMAP = {
    ArrowLeft: "left", ArrowRight: "right", ArrowUp: "jump",
    " ": "jump", Spacebar: "jump", KeyA: "left", KeyD: "right",
    KeyW: "jump", KeyZ: "jump", KeyX: "jump",
  };
  addEventListener("keydown", (e) => {
    const k = KEYMAP[e.key] || KEYMAP[e.code];
    if (k) { keys[k] = true; e.preventDefault(); }
    if ((e.key === "Enter" || e.key === " ") && state !== "play") {
      if (state === "menu" || state === "gameover" || state === "win") startGame();
      e.preventDefault();
    }
  });
  addEventListener("keyup", (e) => {
    const k = KEYMAP[e.key] || KEYMAP[e.code];
    if (k) { keys[k] = false; e.preventDefault(); }
  });

  // ---------- 碰撞 ----------
  function rectsOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function moveAndCollide(ent) {
    // 水平
    ent.x += ent.vx;
    for (const s of solids) {
      if (rectsOverlap(ent, s)) {
        if (ent.vx > 0) ent.x = s.x - ent.w;
        else if (ent.vx < 0) ent.x = s.x + s.w;
        ent.vx = 0;
      }
    }
    // 垂直
    ent.onGround = false;
    ent.y += ent.vy;
    for (const s of solids) {
      if (rectsOverlap(ent, s)) {
        if (ent.vy > 0) {            // 下落着地
          ent.y = s.y - ent.h;
          ent.vy = 0;
          ent.onGround = true;
        } else if (ent.vy < 0) {     // 顶到东西
          ent.y = s.y + s.h;
          ent.vy = 0;
          if (s.bump && !s.bump.used) bumpBlock(s.bump);
        }
      }
    }
  }

  function bumpBlock(b) {
    b.bumpT = 8;
    if (b.type === "?") {
      b.used = true;
      coinCount++; score += 200;
      spawnFloat(b.x + TILE / 2, b.y - 6, "+200");
      // 冒出金币动画
      coins.push({ x: b.x + 6, y: b.y - TILE, t: 0, taken: false, pop: 18, vy: -3 });
    } else if (b.type === "B") {
      // 砖块被顶：碎裂
      b.used = true;
      score += 50;
      for (const s of solids) if (s.bump === b) s.dead = true;
      solids = solids.filter(s => !s.dead);
      for (let i = 0; i < 6; i++)
        particles.push({ x: b.x + TILE/2, y: b.y + TILE/2,
          vx: (i%2?1:-1)*(1+Math.random()*2), vy: -3-Math.random()*3, life: 30, c: "#c84c0c" });
    }
  }

  function spawnFloat(x, y, txt) { floatTexts.push({ x, y, txt, life: 40 }); }

  // ---------- 更新 ----------
  function update() {
    ticks++;
    if (state !== "play") return;
    const p = player;

    if (p.won) {
      p.winT++;
      // 落地后走向城堡
      if (!p.onGround) { p.vy += GRAVITY; }
      p.x += 1.2; p.vx = 1.2;
      moveAndCollide(p);
      p.walkT += 0.3;
      if (p.winT > 140) { state = "win"; showWin(); }
      updateCam();
      return;
    }

    // 计时
    if (ticks % 40 === 0 && timeLeft > 0) timeLeft--;
    if (timeLeft <= 0) { loseLife(); return; }

    // 左右移动
    if (keys.left)  { p.vx -= MOVE_ACCEL; p.face = -1; }
    if (keys.right) { p.vx += MOVE_ACCEL; p.face = 1; }
    if (!keys.left && !keys.right) p.vx *= FRICTION;
    p.vx = Math.max(-MAX_RUN, Math.min(MAX_RUN, p.vx));
    if (Math.abs(p.vx) < 0.05) p.vx = 0;

    // 跳跃
    if (keys.jump && p.onGround && !p.jumping) {
      p.vy = JUMP_V; p.jumping = true; p.onGround = false;
    }
    if (!keys.jump) p.jumping = false;
    if (keys.jump && p.vy < 0 && p.jumping) p.vy += JUMP_HOLD; // 长按更高

    // 重力
    p.vy += GRAVITY;
    if (p.vy > MAX_FALL) p.vy = MAX_FALL;

    moveAndCollide(p);
    if (Math.abs(p.vx) > 0.3 && p.onGround) p.walkT += 0.25; else p.walkT = 0;

    // 掉出地图
    if (p.y > LEVEL_H + 40) { loseLife(); return; }

    if (p.invuln > 0) p.invuln--;

    // 抵达旗杆
    if (!p.won && p.x + p.w >= flagX && p.x < flagX + TILE) {
      p.won = true; p.winT = 0; p.vx = 0; p.vy = 0;
      score += Math.max(0, Math.floor((H - p.y))) + timeLeft * 10;
      spawnFloat(flagX, p.y, "GOAL!");
    }

    // 敌人
    for (const e of enemies) {
      if (e.dead) { e.deadT++; continue; }
      if (Math.abs((e.x) - (camX + W/2)) > W) continue; // 视野外不更新
      e.vy += GRAVITY;
      if (e.vy > MAX_FALL) e.vy = MAX_FALL;
      // 水平移动 + 撞墙转向
      e.x += e.vx;
      let hitWall = false;
      for (const s of solids) {
        if (rectsOverlap(e, s)) {
          if (e.vx > 0) e.x = s.x - e.w; else e.x = s.x + s.w;
          hitWall = true;
        }
      }
      if (hitWall) e.vx = -e.vx;
      // 垂直
      e.y += e.vy;
      let grounded = false;
      for (const s of solids) {
        if (rectsOverlap(e, s)) {
          if (e.vy > 0) { e.y = s.y - e.h; e.vy = 0; grounded = true; }
          else { e.y = s.y + s.h; e.vy = 0; }
        }
      }
      // 边缘检测：到平台边缘也转向
      if (grounded) {
        const aheadX = e.vx > 0 ? e.x + e.w + 2 : e.x - 2;
        const footC = Math.floor(aheadX / TILE);
        const footR = Math.floor((e.y + e.h + 4) / TILE);
        let support = false;
        for (const s of solids)
          if (s.x <= aheadX && aheadX < s.x + s.w && Math.abs(s.y - (footR*TILE)) < TILE) { support = true; break; }
        if (!support) e.vx = -e.vx;
      }
      if (e.y > LEVEL_H + 60) e.dead = true;

      // 与玩家碰撞
      if (!e.dead && rectsOverlap(p, e)) {
        if (p.vy > 1 && p.y + p.h - e.y < 18) {
          // 踩扁
          e.dead = true; e.deadT = 0;
          p.vy = JUMP_V * 0.6;
          score += 100; spawnFloat(e.x + e.w/2, e.y, "+100");
        } else if (p.invuln <= 0) {
          loseLife(); return;
        }
      }
    }

    // 金币收集
    for (const co of coins) {
      if (co.taken) continue;
      if (co.pop !== undefined) { // 顶出来的金币
        co.y += co.vy; co.vy += 0.4; co.pop--;
        if (co.pop <= 0) co.taken = true;
        continue;
      }
      const cb = { x: co.x, y: co.y, w: 20, h: 24 };
      if (rectsOverlap(p, cb)) {
        co.taken = true; coinCount++; score += 100;
        spawnFloat(co.x, co.y, "+100");
        if (coinCount % 100 === 0) lives++;
      }
    }

    // 砖块弹动衰减
    for (const b of bumpables) if (b.bumpT > 0) b.bumpT--;

    // 粒子/浮字
    for (const pa of particles) { pa.x += pa.vx; pa.y += pa.vy; pa.vy += 0.3; pa.life--; }
    particles = particles.filter(pa => pa.life > 0);
    for (const ft of floatTexts) { ft.y -= 0.6; ft.life--; }
    floatTexts = floatTexts.filter(ft => ft.life > 0);

    updateCam();
  }

  function updateCam() {
    camX = player.x + player.w/2 - W/2;
    camX = Math.max(0, Math.min(camX, LEVEL_W - W));
  }

  function loseLife() {
    lives--;
    player.invuln = 90;
    if (lives <= 0) { state = "gameover"; showGameOver(); }
    else {
      // 重置位置但保留分数
      const s = score, cc = coinCount, lv = lives;
      resetLevel(false);
      score = s; coinCount = cc; lives = lv;
    }
  }

  // ---------- 渲染 ----------
  function draw() {
    // 天空渐变
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "#5c94fc");
    g.addColorStop(1, "#8fc1ff");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    drawClouds();
    drawHills();

    ctx.save();
    ctx.translate(-Math.round(camX), 0);

    // 旗杆
    drawFlag();

    // 实体砖块/地面/管道
    for (const s of solids) {
      if (s.x + s.w < camX - TILE || s.x > camX + W + TILE) continue;
      const yOff = s.bump && s.bump.bumpT > 0 ? -Math.sin(s.bump.bumpT/8*Math.PI)*8 : 0;
      drawTile(s, yOff);
    }
    // 问号块单独处理已用状态由 drawTile 处理

    // 金币
    for (const co of coins) {
      if (co.taken) continue;
      co.t += 0.2;
      drawCoin(co.x, co.y, co.t);
    }

    // 敌人
    for (const e of enemies) drawGoomba(e);

    // 粒子
    for (const pa of particles) {
      ctx.fillStyle = pa.c;
      ctx.fillRect(pa.x - 3, pa.y - 3, 6, 6);
    }

    // 玩家
    drawMario(player);

    // 浮动文字
    ctx.font = "12px 'Courier New', monospace";
    ctx.fillStyle = "#fff";
    ctx.textAlign = "center";
    for (const ft of floatTexts) {
      ctx.globalAlpha = Math.min(1, ft.life / 20);
      ctx.fillStyle = "#fff";
      ctx.fillText(ft.txt, ft.x, ft.y);
      ctx.globalAlpha = 1;
    }
    ctx.textAlign = "left";

    ctx.restore();

    drawHUD();
  }

  function drawClouds() {
    ctx.fillStyle = "rgba(255,255,255,.9)";
    const base = -camX * 0.3;
    for (let i = 0; i < 8; i++) {
      const x = ((base + i * 320) % (LEVEL_W)) ;
      const y = 50 + (i % 3) * 30;
      cloud(x, y);
    }
  }
  function cloud(x, y) {
    ctx.beginPath();
    ctx.arc(x, y, 18, 0, 7); ctx.arc(x + 22, y + 4, 22, 0, 7);
    ctx.arc(x + 48, y, 18, 0, 7); ctx.fill();
    ctx.fillRect(x, y, 48, 16);
  }
  function drawHills() {
    ctx.fillStyle = "#3aa93a";
    const base = -camX * 0.5;
    for (let i = 0; i < 6; i++) {
      const x = base + i * 360;
      ctx.beginPath();
      ctx.moveTo(x, H - 64);
      ctx.quadraticCurveTo(x + 80, H - 200, x + 160, H - 64);
      ctx.fill();
    }
  }

  function drawTile(s, yOff) {
    const x = s.x, y = s.y + (yOff || 0);
    const k = s.kind || s.type;
    const bump = s.bump;
    if (k === "X") {
      // 地面/砖块
      if (s.y >= (ROWS - 2) * TILE) {
        // 泥土地面
        ctx.fillStyle = "#c84c0c"; ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = "#e87c3c";
        ctx.fillRect(x + 2, y + 2, TILE - 4, 6);
        ctx.fillStyle = "#000"; ctx.fillRect(x, y, TILE, 1);
      } else {
        brick(x, y);
      }
    } else if (k === "B") {
      if (bump && bump.used) { /* 被打碎，不会到这 */ }
      brick(x, y);
    } else if (k === "?") {
      if (bump && bump.used) {
        // 用过的块：变成暗块
        ctx.fillStyle = "#9a6b2f"; ctx.fillRect(x, y, TILE, TILE);
        ctx.strokeStyle = "#5a3b18"; ctx.lineWidth = 2;
        ctx.strokeRect(x + 2, y + 2, TILE - 4, TILE - 4);
      } else {
        ctx.fillStyle = "#f8b800"; ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = "#e09000"; ctx.fillRect(x, y, TILE, 3);
        ctx.strokeStyle = "#000"; ctx.lineWidth = 2;
        ctx.strokeRect(x + 1, y + 1, TILE - 2, TILE - 2);
        ctx.fillStyle = "#fff";
        ctx.font = "bold 20px 'Courier New'";
        ctx.fillText("?", x + 9, y + 23);
      }
    } else if (k === "P" || k === "=") {
      // 管道
      ctx.fillStyle = "#00a800"; ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = "#00d000"; ctx.fillRect(x + 3, y, 6, TILE);
      ctx.fillStyle = "#005000"; ctx.fillRect(x + TILE - 6, y, 4, TILE);
      ctx.strokeStyle = "#000"; ctx.lineWidth = 2;
      ctx.strokeRect(x, y, TILE, TILE);
    }
  }
  function brick(x, y) {
    ctx.fillStyle = "#c84c0c"; ctx.fillRect(x, y, TILE, TILE);
    ctx.strokeStyle = "#7a2f08"; ctx.lineWidth = 2;
    ctx.strokeRect(x + 1, y + 1, TILE - 2, TILE - 2);
    ctx.beginPath();
    ctx.moveTo(x, y + TILE/2); ctx.lineTo(x + TILE, y + TILE/2);
    ctx.moveTo(x + TILE/2, y); ctx.lineTo(x + TILE/2, y + TILE/2);
    ctx.moveTo(x + TILE/4, y + TILE/2); ctx.lineTo(x + TILE/4, y + TILE);
    ctx.moveTo(x + 3*TILE/4, y + TILE/2); ctx.lineTo(x + 3*TILE/4, y + TILE);
    ctx.stroke();
  }

  function drawCoin(x, y, t) {
    const wob = Math.abs(Math.cos(t)) * 8 + 4;
    ctx.fillStyle = "#f8d000";
    ctx.beginPath();
    ctx.ellipse(x + 10, y + 12, wob/2 + 3, 12, 0, 0, 7);
    ctx.fill();
    ctx.fillStyle = "#b88800";
    ctx.beginPath();
    ctx.ellipse(x + 10, y + 12, wob/4 + 1, 7, 0, 0, 7);
    ctx.fill();
  }

  function drawGoomba(e) {
    if (e.dead && e.deadT > 30) return;
    const x = e.x, y = e.y;
    if (e.dead) {
      // 被踩扁
      ctx.fillStyle = "#7a4a1a";
      ctx.fillRect(x, y + e.h - 8, e.w, 8);
      return;
    }
    ctx.fillStyle = "#7a4a1a"; // 身体
    ctx.beginPath();
    ctx.ellipse(x + e.w/2, y + e.h/2, e.w/2, e.h/2, 0, 0, 7);
    ctx.fill();
    ctx.fillStyle = "#3a2208"; // 脚
    const sw = (Math.floor(ticks/8) % 2) ? 0 : 4;
    ctx.fillRect(x + 2 + sw, y + e.h - 6, 8, 6);
    ctx.fillRect(x + e.w - 12 - sw, y + e.h - 6, 8, 6);
    ctx.fillStyle = "#fff"; // 眼白
    ctx.fillRect(x + 5, y + 7, 6, 7);
    ctx.fillRect(x + e.w - 11, y + 7, 6, 7);
    ctx.fillStyle = "#000"; // 眼珠
    ctx.fillRect(x + 8, y + 9, 3, 4);
    ctx.fillRect(x + e.w - 8, y + 9, 3, 4);
  }

  function drawMario(p) {
    if (p.invuln > 0 && Math.floor(ticks/4) % 2) return; // 受伤闪烁
    const x = p.x, y = p.y, f = p.face;
    ctx.save();
    ctx.translate(x + p.w/2, y);
    ctx.scale(f, 1);
    ctx.translate(-p.w/2, 0);
    // 帽子
    ctx.fillStyle = "#e52521";
    ctx.fillRect(2, 0, p.w - 4, 6);
    ctx.fillRect(p.w/2 - 2, 0, p.w - 6, 4);
    // 脸
    ctx.fillStyle = "#fbc7a4";
    ctx.fillRect(4, 6, p.w - 8, 8);
    // 胡子/眼
    ctx.fillStyle = "#000";
    ctx.fillRect(p.w - 9, 8, 2, 3);
    ctx.fillStyle = "#7a3b10";
    ctx.fillRect(p.w - 8, 11, 5, 2);
    // 背带衣
    ctx.fillStyle = "#1565c0";
    ctx.fillRect(3, 14, p.w - 6, 10);
    // 红衣袖
    ctx.fillStyle = "#e52521";
    const armSwing = p.onGround ? Math.sin(p.walkT) * 3 : -2;
    ctx.fillRect(0, 15, 5, 7);
    ctx.fillRect(p.w - 5, 15, 5, 7);
    // 腿
    ctx.fillStyle = "#1565c0";
    const legSwing = p.onGround ? Math.sin(p.walkT) * 4 : 0;
    ctx.fillStyle = "#5a2d0c";
    ctx.fillRect(4, 24 + 0, 7, 6 + (p.onGround? Math.max(0,legSwing):0));
    ctx.fillRect(p.w - 11, 24, 7, 6 + (p.onGround? Math.max(0,-legSwing):0));
    ctx.restore();
  }

  function drawFlag() {
    const fx = flagX + TILE/2;
    const topY = 5 * TILE;
    const botY = (ROWS - 2) * TILE;
    ctx.fillStyle = "#bdbdbd";
    ctx.fillRect(fx - 2, topY, 4, botY - topY);
    ctx.fillStyle = "#2ecc40";
    ctx.beginPath();
    ctx.moveTo(fx + 2, topY + 4);
    ctx.lineTo(fx + 34, topY + 14);
    ctx.lineTo(fx + 2, topY + 24);
    ctx.fill();
    ctx.fillStyle = "#ffd700";
    ctx.beginPath();
    ctx.arc(fx, topY, 6, 0, 7); ctx.fill();
    // 城堡（终点装饰）
    const cx = flagX + 3 * TILE;
    ctx.fillStyle = "#c84c0c";
    ctx.fillRect(cx, botY - 96, 96, 96);
    ctx.fillStyle = "#7a2f08";
    ctx.fillRect(cx + 36, botY - 50, 24, 50);
    for (let i = 0; i < 4; i++) ctx.fillRect(cx + i*24, botY - 110, 16, 14);
  }

  function drawHUD() {
    ctx.fillStyle = "#fff";
    ctx.font = "14px 'Courier New', monospace";
    ctx.textAlign = "left";
    ctx.fillText("分数 " + String(score).padStart(6, "0"), 16, 26);
    // 金币图标
    ctx.fillStyle = "#f8d000";
    ctx.beginPath(); ctx.arc(210, 21, 7, 0, 7); ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.fillText("× " + String(coinCount).padStart(2, "0"), 222, 26);
    ctx.fillText("时间 " + timeLeft, 330, 26);
    ctx.fillText("生命 ", 470, 26);
    ctx.fillStyle = "#e52521";
    for (let i = 0; i < lives; i++) ctx.fillRect(520 + i * 18, 14, 12, 12);
  }

  // ---------- 结束界面 ----------
  function showGameOver() {
    overlay.classList.remove("hidden");
    overlay.innerHTML =
      '<h1 style="color:#ff5555">游戏结束</h1>' +
      '<p>最终得分 <span class="key">' + score + '</span><br>金币 ' + coinCount +
      '<br><br>按 <span class="key">回车</span> 或 <span class="key">空格</span> 重新开始</p>';
  }
  function showWin() {
    overlay.classList.remove("hidden");
    overlay.innerHTML =
      '<h1 style="color:#ffd700">🏰 通关成功！</h1>' +
      '<p>恭喜抵达旗杆！<br>得分 <span class="key">' + score + '</span> · 金币 ' + coinCount +
      '<br><br>按 <span class="key">回车</span> 或 <span class="key">空格</span> 再玩一次</p>';
  }

  // ---------- 主循环 ----------
  state = "menu";
  resetLevel(true);
  function loop() {
    update();
    draw();
    if (state === "menu") {
      // 菜单时也渲染背景
    }
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
</body>
</html>
